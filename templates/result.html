<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .result-card {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        text-align: center;
        width: 100%;
        max-width: 450px;
    }

    .result-text {
        font-size: 28px;
        font-weight: 600;
    }

    .high-risk {
        color: #EF4444;
    }

    .normal-risk {
        color: #10B981;
    }

    .btn-custom {
        margin-top: 20px;
        border-radius: 25px;
        padding: 10px 25px;
        font-weight: 600;
    }
</style>
</head>

<body>

<div class="result-card">

    <h2 class="mb-3">📊 Prediction Result</h2>

    <!-- Dynamic Result Color -->
    <div class="result-text 
        {% if risk == 'High' %} high-risk {% else %} normal-risk {% endif %}">
        {{ result }}
    </div>

    <p class="mt-3">Probability: <strong>{{ prob }}%</strong></p>
    <p>Risk Level: <strong>{{ risk }}</strong></p>

    <a href="/dashboard" class="btn btn-light btn-custom">⬅ Back to Dashboard</a>

</div>

</body>
</html>
